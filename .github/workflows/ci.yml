name: CI

on:
  push:
    branches:
      - main
      - develop/**
      - release/**
      - fix/**
      - feature/**
  pull_request:
    branches:
      - main
      - develop/**

# 🔁 同一分支/PR 有新 push 时，自动取消旧 run，节省资源
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.26.1"

jobs:
  # ═══════════════════════════════════════════
  # 快速检查：所有分支均执行
  # ═══════════════════════════════════════════
  quick-check:
    name: Quick Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Vet
        run: |
          pkgs=$(go list ./... 2>/dev/null) || true
          if [ -n "$pkgs" ]; then
            go vet ./...
          fi

      - name: Format Check
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then
            echo "Files not gofmt'd:"
            echo "$fmt"
            exit 1
          fi

      - name: Mod Tidy Check
        run: |
          if [ -f go.sum ]; then
            go mod tidy -diff
          fi

  # ═══════════════════════════════════════════
  # 测试 + 竞争检测：所有分支均执行
  # ═══════════════════════════════════════════
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quick-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Test
        run: |
          pkgs=$(go list ./... 2>/dev/null) || true
          if [ -n "$pkgs" ]; then
            go test -race -cover -count=1 -coverprofile=coverage.out ./...
            go tool cover -func=coverage.out
          fi

  # ═══════════════════════════════════════════
  # 构建检查：所有分支均执行
  # ═══════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quick-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Build
        run: |
          pkgs=$(go list ./... 2>/dev/null) || true
          if [ -n "$pkgs" ]; then
            go build ./...
          fi

  # ═══════════════════════════════════════════
  # 深度检查：仅 main / develop / release 执行
  # ═══════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: quick-check
    if: |
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/develop/') ||
      startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-v2-${{ env.GO_VERSION }}

      - name: Install golangci-lint
        run: |
          command -v golangci-lint &>/dev/null || go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint
        run: |
          pkgs=$(go list ./... 2>/dev/null) || true
          if [ -n "$pkgs" ]; then
            golangci-lint run --config=.github/.golangci.yml
          fi

  # ═══════════════════════════════════════════
  # 安全扫描：仅 main / release 执行
  # ═══════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quick-check
    if: |
      github.base_ref == 'main' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Cache Govulncheck
        uses: actions/cache@v4
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ env.GO_VERSION }}

      - name: Govulncheck
        run: |
          command -v govulncheck &>/dev/null || go install golang.org/x/vuln/cmd/govulncheck@latest
          pkgs=$(go list ./... 2>/dev/null) || true
          if [ -n "$pkgs" ]; then
            govulncheck ./...
          fi
